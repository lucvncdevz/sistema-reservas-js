<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="/client/css/auth.css" />
  </head>

  <body>
    <div class="container">
      <h1>Fazer Cadastro</h1>
      <form action="/client/pages/agendarReserva.html">
        <label for="nome">Nome</label> <br />
        <input id="nome" placeholder="Digite seu nome"  required/> <br />
        <label for="gmail">E-mail</label> <br />
        <input id="gmail" placeholder="Digite seu gmail" required/> <br />
        <label for="senha">Senha</label> <br />
        <input id="senha" placeholder="Digite sua senha" required type="password"/> <br />
        <label for="cpf">CPF</label> <br />
        <input id="cpf" placeholder="Digite seu cpf" required/> <br />
        <input class="button" type="submit" />
      </form>
      <a class="link" href="/client/pages/login.html">Possui conta? <span style="color: #538999 ;">Clique aqui </span> </a> <br />
    </div>
  </body>
</html>
