<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/constants/sideBar/menu.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
  </head>
  <body>
    <header>
      <a href="#" class="btn-abrir" onclick="AbrirMenu()">&#9776; Abrir</a>
    </header>

    <nav id="menu">
      <a href="#" onclick="FecharMenu()">&times; Fechar</a>
      <a href="/html/pages/agendarReserva.html">Fazer Reserva</a>
      <a href="#">Minhas Reservas</a>
      <a href="/html/pages/dashboard.html">Dashboard</a>
      <a href="/index.html">Deslogar Conta</a>
    </nav>

    <main id="conteudo">
      <div class="container">
        <div class="photo-perfil"></div>
        <form method="post">
          <label>Nome</label><br />
          <input id="display-nome" /><br />

          <label>E-mail</label><br />
          <input id="display-email" /><br />

          <label>CPF</label><br />
          <input id="display-cpf" /><br />

          <label>Senha</label><br />
          <input id="display-senha" type="password" /><br />

          <button type="submit">Atualizar dados</button>
        </form>
      </div>
    </main>
  </body>
  <script>
    const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));

    if (!usuario) {
      alert("Acesso negado! Faça login primeiro.");
      window.location.href = "/index.html";
    } else {
      document.getElementById("display-nome").value = usuario.nome;
      document.getElementById("display-email").value = usuario.email;
      document.getElementById("display-cpf").value = usuario.cpf;
    }

    function AbrirMenu() {
      document.getElementById("menu").style.width = "250px";
      document.getElementById("conteudo").style.marginLeft = "250px";
    }
    function FecharMenu() {
      document.getElementById("menu").style.width = "0px";
      document.getElementById("conteudo").style.marginLeft = "0px";
    }
  </script>
</html>
