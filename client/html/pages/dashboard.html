<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/constants/sideBar/menu.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
  </head>
  <body>
    <header>
      <a href="#" class="btn-abrir" onclick="AbrirMenu()">&#9776; Abrir</a>
    </header>

    <nav id="menu">
      <a href="#" onclick="FecharMenu()">&times; Fechar</a>
      <a href="/html/pages/agendarReserva.html">Fazer Reserva</a>
      <a href="#">Minhas Reservas</a>
      <a href="/html/pages/dashboard.html">Dashboard</a>
      <a href="#" onclick="logout()">Deslogar Conta</a>
    </nav>

    <main id="conteudo">
      <div class="container">
        <div class="photo-perfil"></div>
        <form method="post">
          <label>Nome</label><br />
          <input id="display-nome" /><br />

          <label>E-mail</label><br />
          <input id="display-email" /><br />

          <label>CPF</label><br />
          <input id="display-cpf" /><br />

          <button type="submit">Atualizar dados</button>
        </form>
<br>
<hr>
        
        <h2>Alterar Senha</h2>
        <form method="post">
          <label>Senha Atual</label>
          <input id="senhaAtual" placeholder="Digite sua senha atual" type="password">

          <label>Senha Nova</label>
          <input id="senhaNova" placeholder="Digite sua nova senha" type="password">

          <label>Confirmar Senha</label>
          <input id="Confirmar senha nova" placeholder="Digite novamente sua senha nova" type="password">

          <button type="submit">Alterar senha</button>
        </form>
      </div>
    </main>
  </body>
  <script>
    checarAutenticacao();

    async function checarAutenticacao() {
      const token = localStorage.getItem("token");
      // Recupera a string do localStorage e transforma de volta em Objeto
      const usuarioArmazenado = JSON.parse(
        localStorage.getItem("usuarioLogado")
      );

      if (!token || !usuarioArmazenado) {
        window.location.href = "/html/index.html";
        return;
      }

      try {
        const response = await fetch("/validar-acesso", {
          method: "GET",
          headers: {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
          },
        });

        const result = await response.json();

        if (result.erro) {
          alert("Sessão expirada. Faça login novamente.");
          localStorage.clear(); // Limpa tudo de uma vez
          window.location.href = "/html/index.html";
        } else {
        
          document.getElementById("display-nome").value = usuarioArmazenado.nome;
          document.getElementById("display-email").value = usuarioArmazenado.email;
          document.getElementById("display-cpf").value = usuarioArmazenado.cpf;

        }
      } catch (error) {
        console.error("Erro na validação:", error);
        window.location.href = "/html/index.html";
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "/html/index.html";
    }

    function AbrirMenu() {
      document.getElementById("menu").style.width = "250px";
      document.getElementById("conteudo").style.marginLeft = "250px";
    }
    function FecharMenu() {
      document.getElementById("menu").style.width = "0px";
      document.getElementById("conteudo").style.marginLeft = "0px";
    }
  </script>
</html>
